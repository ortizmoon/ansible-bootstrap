---
- name: Install rclone
  ansible.builtin.shell:
    cmd: curl https://rclone.org/install.sh | bash
    creates: /usr/bin/rclone

- name: Create rclone config directory
  ansible.builtin.file:
    path: /root/.config/rclone
    state: directory
    mode: "0700"

- name: Deploy rclone config
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: /root/.config/rclone/rclone.conf
    mode: "0600"
  no_log: true

- name: Deploy backup script
  ansible.builtin.template:
    src: vault-backup-r2.sh.j2
    dest: "{{ vault_backup_script_path }}"
    mode: "0700"
  no_log: true

- name: Deploy backup systemd service
  ansible.builtin.template:
    src: vault-backup.service.j2
    dest: /etc/systemd/system/vault-backup.service
    mode: "0644"
  notify: Reload systemd

- name: Deploy backup systemd timer
  ansible.builtin.template:
    src: vault-backup.timer.j2
    dest: /etc/systemd/system/vault-backup.timer
    mode: "0644"
  notify: Reload systemd

- name: Enable backup timer
  ansible.builtin.systemd:
    name: vault-backup.timer
    state: started
    enabled: true
    daemon_reload: true
