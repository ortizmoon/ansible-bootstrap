---
- name: Install rclone
  ansible.builtin.apt:
    name: rclone
    state: present

- name: Create rclone config directory
  ansible.builtin.file:
    path: /root/.config/rclone
    state: directory
    mode: "0700"

- name: Deploy rclone config
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: /root/.config/rclone/rclone.conf
    mode: "0600"
  no_log: true

- name: Deploy backup script
  ansible.builtin.template:
    src: gitlab-backup-r2.sh.j2
    dest: "{{ gitlab_backup_script_path }}"
    mode: "0700"
  no_log: true

- name: Deploy backup systemd service
  ansible.builtin.template:
    src: gitlab-backup.service.j2
    dest: /etc/systemd/system/gitlab-backup.service
    mode: "0644"
  notify: Reload systemd

- name: Deploy backup systemd timer
  ansible.builtin.template:
    src: gitlab-backup.timer.j2
    dest: /etc/systemd/system/gitlab-backup.timer
    mode: "0644"
  notify: Reload systemd

- name: Enable backup timer
  ansible.builtin.systemd:
    name: gitlab-backup.timer
    state: started
    enabled: true
    daemon_reload: true
