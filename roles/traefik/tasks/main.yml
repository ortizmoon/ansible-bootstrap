---
- name: Create traefik directory
  ansible.builtin.file:
    path: "{{ traefik_dir }}"
    state: directory
    mode: "0755"

- name: Create acme.json if not exists
  ansible.builtin.file:
    path: "{{ traefik_dir }}/acme.json"
    state: touch
    mode: "0600"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_dir }}/docker-compose.yml"
    mode: "0640"
  no_log: true

- name: Deploy traefik.yml
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_dir }}/traefik.yml"
    mode: "0644"

- name: Deploy dynamic.yml
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: "{{ traefik_dir }}/dynamic.yml"
    mode: "0644"
  notify: Restart traefik

- name: Start traefik
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_dir }}"
    state: present
